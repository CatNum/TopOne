<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-variant": "#e4e2e3",
                    "on-primary-container": "#8590a6",
                    "error-container": "#ffdad6",
                    "on-surface": "#1b1b1d",
                    "surface-container-high": "#eae7e9",
                    "surface-container-lowest": "#ffffff",
                    "secondary-fixed": "#d5e3fd",
                    "on-primary-fixed-variant": "#3c475a",
                    "on-primary-fixed": "#111c2d",
                    "secondary": "#515f74",
                    "inverse-on-surface": "#f3f0f2",
                    "outline-variant": "#c5c6cd",
                    "secondary-container": "#d5e3fd",
                    "primary-container": "#1e293b",
                    "surface-container-low": "#f5f3f4",
                    "tertiary-fixed-dim": "#e9c400",
                    "surface": "#fbf8fa",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed": "#ffe16d",
                    "on-secondary-container": "#57657b",
                    "tertiary-container": "#c9a900",
                    "primary": "#091426",
                    "on-secondary-fixed": "#0d1c2f",
                    "on-error": "#ffffff",
                    "inverse-surface": "#303032",
                    "surface-container-highest": "#e4e2e3",
                    "on-tertiary-fixed": "#221b00",
                    "background": "#fbf8fa",
                    "surface-container": "#f0edef",
                    "on-primary": "#ffffff",
                    "on-tertiary-container": "#4c3f00",
                    "primary-fixed-dim": "#bcc7de",
                    "error": "#ba1a1a",
                    "on-tertiary-fixed-variant": "#544600",
                    "on-error-container": "#93000a",
                    "primary-fixed": "#d8e3fb",
                    "on-tertiary": "#ffffff",
                    "on-surface-variant": "#45474c",
                    "surface-tint": "#545f73",
                    "tertiary": "#705d00",
                    "surface-dim": "#dcd9db",
                    "surface-bright": "#fbf8fa",
                    "outline": "#75777d",
                    "on-background": "#1b1b1d",
                    "secondary-fixed-dim": "#b9c7e0",
                    "inverse-primary": "#bcc7de",
                    "on-secondary-fixed-variant": "#3a485c"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            },
            "animation": {
              "pulse-slow": "pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite",
              "float": "float 6s ease-in-out infinite",
            },
            "keyframes": {
              "float": {
                "0%, 100%": { transform: "translateY(0)" },
                "50%": { transform: "translateY(-10px)" },
              }
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .star-particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.4;
            animation: twinkle var(--duration, 3s) infinite ease-in-out;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.2); }
        }
        .glass-nav {
            background: rgba(13, 20, 36, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="bg-[#020408] font-body text-slate-100 overflow-hidden h-screen w-full select-none">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-transparent flex flex-col items-center">
<div class="w-full flex justify-between items-center px-6 h-14">
<div class="flex items-center transition-opacity hover:opacity-80 cursor-pointer active:scale-95 duration-200">
<span class="material-symbols-outlined text-white/80" data-icon="blur_on">blur_on</span>
</div>
<h1 class="font-headline tracking-tight text-lg font-bold text-white">奖励池</h1>
<div class="flex items-center transition-opacity hover:opacity-80 cursor-pointer active:scale-95 duration-200">
<span class="material-symbols-outlined text-white/80" data-icon="account_circle">account_circle</span>
</div>
</div>
<!-- Tab Switcher -->
<div class="flex bg-white/5 backdrop-blur-md rounded-full p-1 border border-white/10 mt-1">
<button class="px-6 py-1.5 text-sm font-medium text-slate-400 rounded-full transition-all duration-300">列表模式</button>
<button class="px-6 py-1.5 text-sm font-medium text-white bg-white/10 rounded-full shadow-sm transition-all duration-300">星辰模式</button>
</div>
</header>
<!-- Main Canvas -->
<main class="relative h-full w-full flex items-center justify-center">
<!-- Celestial Background -->
<div class="absolute inset-0 z-0 overflow-hidden">
<!-- Star Particles with varied durations -->
<div class="star-particle w-1 h-1 top-[12%] left-[18%]" style="--duration: 4s"></div>
<div class="star-particle w-[2px] h-[2px] top-[22%] left-[75%]" style="--duration: 5s"></div>
<div class="star-particle w-1 h-1 top-[45%] left-[8%] shadow-[0_0_8px_rgba(255,255,255,0.4)]" style="--duration: 3.5s"></div>
<div class="star-particle w-[2px] h-[2px] top-[68%] left-[22%]" style="--duration: 6s"></div>
<div class="star-particle w-1 h-1 top-[82%] left-[88%] shadow-[0_0_8px_rgba(255,255,255,0.4)]" style="--duration: 4.5s"></div>
<div class="star-particle w-[2px] h-[2px] top-[55%] left-[92%]" style="--duration: 5.5s"></div>
<div class="star-particle w-[1px] h-[1px] top-[28%] left-[42%]" style="--duration: 7s"></div>
<div class="star-particle w-1 h-1 top-[15%] left-[55%]" style="--duration: 3.8s"></div>
<!-- Deep Space Gradient -->
<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(16,24,48,0.4)_0%,transparent_80%)]"></div>
</div>
<!-- 3D Earth Sphere Container -->
<div class="relative z-10 w-[300px] h-[300px] md:w-[480px] md:h-[480px] rounded-full overflow-hidden shadow-[0_0_80px_rgba(56,189,248,0.15)] animate-float">
<div class="absolute inset-0 rounded-full border border-white/10 z-20 pointer-events-none"></div>
<div class="absolute inset-0 bg-slate-950">
<img alt="Earth in space" class="w-full h-full object-cover opacity-70 mix-blend-screen scale-110" data-alt="hyper-realistic 3D render of Earth from deep space at night with city lights glowing golden silhouettes of continents cinematic lighting atmospheric haze 4k" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCh7GGxkUVUYWNF27xc6PLz1fl_Y6a3uV482nW8VzLEu-edg_kQs0v2oQp37wSoL4CKgxpCd1NavcsrdKqWj2tDMJm1_iKPAz5f-apx_n25nm79z9j9bkYl4h0FZKvHCf4Gfv4OtPDiUGBWlOPFsIT1TjtUsPDI5l_7ahZgEN5tPv2Xqs7nwKWzr1Pf70i9XBaH5nb6CAHkM8mr4cTYVQybhoB1RU13ZfQv0NWUtxR2KtIuVUaU7iWQanLvCN-s-t5Hl1Q32abq3xE"/>
</div>
<!-- Atmospheric Glow -->
<div class="absolute inset-0 rounded-full shadow-[inset_0_0_100px_rgba(186,230,253,0.15)] z-10"></div>
</div>
<!-- Content Overlay -->
<div class="absolute z-30 flex flex-col items-center justify-center text-center">
<h2 class="text-4xl md:text-5xl font-headline font-bold text-white tracking-widest mb-6 drop-shadow-[0_4px_12px_rgba(0,0,0,0.9)]">星辰模式</h2>
<p class="text-base md:text-lg font-body text-slate-400 tracking-[0.4em] font-light drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">敬请期待</p>
<div class="mt-10 flex gap-4">
<span class="material-symbols-outlined text-white/20 text-xs animate-pulse" data-icon="auto_awesome">auto_awesome</span>
<span class="material-symbols-outlined text-white/20 text-xs animate-pulse" data-icon="auto_awesome" style="animation-delay: 0.5s">auto_awesome</span>
<span class="material-symbols-outlined text-white/20 text-xs animate-pulse" data-icon="auto_awesome" style="animation-delay: 1s">auto_awesome</span>
</div>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full glass-nav px-6 pb-8 pt-4 border-t border-white/5 z-50 rounded-t-[2.5rem] flex justify-between items-center shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
<!-- 任务 -->
<a class="flex flex-col items-center justify-center text-slate-500 transition-colors duration-200 hover:text-slate-300" href="#">
<span class="material-symbols-outlined mb-1" data-icon="check_circle">check_circle</span>
<span class="text-[10px] font-medium tracking-wider">任务</span>
</a>
<!-- 奖励 (Active) -->
<a class="flex flex-col items-center justify-center bg-white/10 rounded-2xl px-6 py-2.5 shadow-inner" href="#">
<span class="material-symbols-outlined text-white mb-0.5" data-icon="stars" style="font-variation-settings: 'FILL' 1;">stars</span>
<span class="text-white text-[10px] font-semibold tracking-wider">奖励</span>
</a>
<!-- 设置 -->
<a class="flex flex-col items-center justify-center text-slate-500 transition-colors duration-200 hover:text-slate-300" href="#">
<span class="material-symbols-outlined mb-1" data-icon="settings">settings</span>
<span class="text-[10px] font-medium tracking-wider">设置</span>
</a>
</nav>
</body></html>
