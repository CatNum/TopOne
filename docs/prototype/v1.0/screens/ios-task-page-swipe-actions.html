<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#e9c400",
                        "outline-variant": "#c5c6cd",
                        "on-primary-fixed": "#111c2d",
                        "secondary-container": "#d5e3fd",
                        "secondary": "#515f74",
                        "primary-container": "#1e293b",
                        "on-secondary-fixed-variant": "#3a485c",
                        "on-secondary-fixed": "#0d1c2f",
                        "on-error-container": "#93000a",
                        "on-tertiary": "#ffffff",
                        "surface-bright": "#fbf8fa",
                        "surface-variant": "#e4e2e3",
                        "inverse-on-surface": "#f3f0f2",
                        "on-surface-variant": "#45474c",
                        "outline": "#75777d",
                        "surface-container-highest": "#e4e2e3",
                        "tertiary-fixed": "#ffe16d",
                        "primary-fixed-dim": "#bcc7de",
                        "on-tertiary-fixed": "#221b00",
                        "tertiary-container": "#c9a900",
                        "surface-dim": "#dcd9db",
                        "error-container": "#ffdad6",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed": "#d5e3fd",
                        "on-secondary": "#ffffff",
                        "on-background": "#1b1b1d",
                        "on-primary-fixed-variant": "#3c475a",
                        "surface-container-high": "#eae7e9",
                        "primary-fixed": "#d8e3fb",
                        "on-tertiary-fixed-variant": "#544600",
                        "on-tertiary-container": "#4c3f00",
                        "error": "#ba1a1a",
                        "tertiary": "#705d00",
                        "on-primary": "#ffffff",
                        "on-secondary-container": "#57657b",
                        "primary": "#091426",
                        "surface": "#fbf8fa",
                        "inverse-surface": "#303032",
                        "surface-tint": "#545f73",
                        "surface-container-low": "#f5f3f4",
                        "on-primary-container": "#8590a6",
                        "surface-container": "#f0edef",
                        "on-surface": "#1b1b1d",
                        "on-error": "#ffffff",
                        "inverse-primary": "#bcc7de",
                        "secondary-fixed-dim": "#b9c7e0",
                        "background": "#fbf8fa"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .task-swipe-container {
            overflow: hidden;
            position: relative;
        }
        .task-swipe-content {
            transform: translateX(-180px); /* Simulated swiped state */
        }
        .glass-panel {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#fbf8fa]/80 backdrop-blur-md flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#091426]">menu</span>
<h1 class="text-xl font-bold tracking-[-0.02em] text-[#091426]">TopOne</h1>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden">
<img alt="User Avatar" class="w-full h-full object-cover" data-alt="professional portrait of a creative professional in a sunlit architectural studio, soft natural lighting, minimalist aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuALvd_vW2cap2PXd5Vba37sr2ppgkdn22R87y3TCVmBBhTFW2TZTicS_smNj73lDBJ6ofade-p0kCgdFs89G9NeV4ARiJ6f6_JNLaI3ewEZ31449DtO9fsT51Bp3ub6sNOZ2g0DzKPpgtOg2W4LxQq1dr_To1ULw8L8e01YkesRgGBgtmHSEfxz8g84B6VqSC_MEclNtQgds4R0el9qp2WK7LAlNH1DcSsqLhfCQ5IWeANy21kaKHqhmQmQlOAOyJ4wV7cLREyZX8I"/>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto space-y-10">
<!-- Today's Morning Focus - The 'Top One' Hero Card -->
<section class="space-y-4">
<div class="flex items-center justify-between">
<h2 class="text-sm font-semibold uppercase tracking-widest text-on-surface-variant">当前专注</h2>
<span class="text-xs text-tertiary font-bold px-2 py-1 bg-tertiary-fixed/30 rounded-lg">HIGH PRIORITY</span>
</div>
<div class="relative bg-primary rounded-[2rem] p-8 overflow-hidden group">
<div class="absolute left-0 top-1/4 bottom-1/4 w-1 bg-tertiary rounded-r-full"></div>
<div class="space-y-6">
<div class="flex justify-between items-start">
<div class="space-y-1">
<h3 class="text-2xl font-bold text-white tracking-tight">完成季度品牌手册设计</h3>
<p class="text-on-primary-container text-sm">截止日期：今天下午 5:00</p>
</div>
<button class="bg-white/10 hover:bg-white/20 p-2 rounded-full transition-colors">
<span class="material-symbols-outlined text-white">edit</span>
</button>
</div>
<!-- Progress Section with Interactive Pulse -->
<div class="space-y-3">
<div class="flex justify-between items-end">
<span class="text-xs font-medium text-on-primary-container uppercase tracking-tighter">进度</span>
<button class="text-3xl font-extrabold text-tertiary-fixed-dim tracking-tighter hover:scale-110 transition-transform cursor-pointer">
                                65%
                            </button>
</div>
<div class="relative h-2 w-full bg-primary-container rounded-full overflow-hidden">
<div class="absolute inset-y-0 left-0 bg-gradient-to-r from-tertiary to-tertiary-fixed-dim w-[65%] rounded-full shadow-[0_0_12px_rgba(233,196,0,0.4)]"></div>
</div>
<p class="text-[10px] text-white/40 italic">点击百分比可手动编辑进度</p>
</div>
</div>
<!-- Focus Pulse Background -->
<div class="absolute -right-16 -top-16 w-64 h-64 bg-tertiary-fixed-dim/5 rounded-full blur-[60px] pointer-events-none"></div>
</div>
</section>
<!-- Daily Tasks List -->
<section class="space-y-6">
<h2 class="text-sm font-semibold uppercase tracking-widest text-on-surface-variant px-1">日常任务</h2>
<div class="space-y-3">
<!-- Swiped Task Row -->
<div class="task-swipe-container rounded-3xl group">
<!-- Action Buttons (Visible when swiped) -->
<div class="absolute inset-0 flex justify-end">
<div class="flex h-full">
<button class="w-[60px] bg-surface-container-high flex flex-col items-center justify-center gap-1">
<span class="material-symbols-outlined text-on-surface-variant text-xl">sync</span>
<span class="text-[9px] font-bold">更新</span>
</button>
<button class="w-[60px] bg-secondary-container flex flex-col items-center justify-center gap-1">
<span class="material-symbols-outlined text-on-secondary-container text-xl">edit</span>
<span class="text-[9px] font-bold">编辑</span>
</button>
<button class="w-[60px] bg-error flex flex-col items-center justify-center gap-1">
<span class="material-symbols-outlined text-white text-xl">delete</span>
<span class="text-[9px] font-bold text-white">删除</span>
</button>
</div>
</div>
<!-- Main Content Card (Swiped state) -->
<div class="task-swipe-content bg-surface-container-low p-5 rounded-3xl flex items-center gap-4 transition-transform duration-500 cubic-bezier(0.2,0.8,0.2,1) relative z-10">
<div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-primary">mail</span>
</div>
<div class="flex-1">
<h4 class="font-bold text-primary">回复客户反馈邮件</h4>
<p class="text-xs text-on-surface-variant">20 分钟前更新</p>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</div>
</div>
<!-- Normal Task Row -->
<div class="bg-surface-container-low p-5 rounded-3xl flex items-center gap-4 hover:bg-surface-container-high transition-colors">
<div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-primary">fitness_center</span>
</div>
<div class="flex-1">
<h4 class="font-bold text-primary">每日身体锻炼</h4>
<p class="text-xs text-on-surface-variant">已完成 2/3</p>
</div>
<div class="w-6 h-6 border-2 border-outline-variant rounded-full"></div>
</div>
<!-- Normal Task Row 2 -->
<div class="bg-surface-container-low p-5 rounded-3xl flex items-center gap-4 hover:bg-surface-container-high transition-colors">
<div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-primary">local_cafe</span>
</div>
<div class="flex-1">
<h4 class="font-bold text-primary">下午茶冥想</h4>
<p class="text-xs text-on-surface-variant">尚未开始</p>
</div>
<div class="w-6 h-6 border-2 border-outline-variant rounded-full"></div>
</div>
</div>
</section>
</main>
<!-- Confirmation Modal (Secondary Confirmation) -->
<div class="fixed inset-0 z-[100] flex items-center justify-center p-6">
<div class="absolute inset-0 bg-primary/40 backdrop-blur-sm"></div>
<div class="relative bg-surface-container-lowest w-full max-w-xs rounded-[2rem] p-8 shadow-2xl space-y-6">
<div class="w-14 h-14 bg-error-container/50 rounded-2xl flex items-center justify-center mx-auto text-error">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">error</span>
</div>
<div class="text-center space-y-2">
<h3 class="text-lg font-bold text-primary">确定删除该任务吗？</h3>
<p class="text-sm text-on-surface-variant leading-relaxed">删除后此任务的所有进度和历史记录将无法恢复。</p>
</div>
<div class="flex flex-col gap-3">
<button class="w-full py-4 bg-error text-white font-bold rounded-full hover:brightness-110 transition-all">
                    确认删除
                </button>
<button class="w-full py-4 bg-surface-container-high text-primary font-bold rounded-full hover:bg-surface-container-highest transition-all">
                    取消
                </button>
</div>
</div>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-3xl bg-[#fbf8fa]/80 backdrop-blur-md shadow-[0_-4px_24px_rgba(9,20,38,0.06)] flex justify-around items-center h-20 w-full px-8 pb-4">
<button class="flex flex-col items-center justify-center text-[#091426] bg-[#f5f3f4] rounded-full px-5 py-1 transition-transform duration-300 scale-95">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="text-[11px] font-medium tracking-wide">任务</span>
</button>
<button class="flex flex-col items-center justify-center text-[#45474c] opacity-60 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined">military_tech</span>
<span class="text-[11px] font-medium tracking-wide">奖励</span>
</button>
<button class="flex flex-col items-center justify-center text-[#45474c] opacity-60 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined">settings</span>
<span class="text-[11px] font-medium tracking-wide">设置</span>
</button>
</nav>
<!-- Contextual FAB (Hidden as per requirement but keeping logic for complete UI) -->
<button class="fixed right-6 bottom-28 w-14 h-14 bg-primary text-white rounded-full shadow-2xl flex items-center justify-center hover:scale-105 active:scale-95 transition-all">
<span class="material-symbols-outlined text-3xl">add</span>
</button>
</body></html>
